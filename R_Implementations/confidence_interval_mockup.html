
<div style="background: #111; border-radius: 12px; padding: 24px; font-family: var(--font-sans);">
  <p style="color: #aaa; font-size: 13px; margin: 0 0 16px;">Simulated price paths</p>
  <div style="position: relative; width: 100%; height: 380px;">
    <canvas id="ciChart" role="img" aria-label="Monte Carlo simulation with confidence interval bands showing P10, P50, and P90 price paths for HSY stock">HSY simulated price paths with P10/P50/P90 confidence bands.</canvas>
  </div>
  <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 16px; font-size: 12px; color: #aaa;">
    <span style="display:flex;align-items:center;gap:6px;"><span style="width:28px;height:3px;background:#388bfd;opacity:0.25;display:inline-block;border-radius:2px;"></span>P10–P90 range</span>
    <span style="display:flex;align-items:center;gap:6px;"><span style="width:28px;height:3px;background:#388bfd;opacity:0.5;display:inline-block;border-radius:2px;"></span>P25–P75 range</span>
    <span style="display:flex;align-items:center;gap:6px;"><span style="width:28px;height:2px;background:#388bfd;display:inline-block;border-radius:2px;"></span>P50 median</span>
    <span style="display:flex;align-items:center;gap:6px;"><span style="width:28px;height:1px;background:#ef4444;display:inline-block;border-radius:2px;border-top: 2px dashed #ef4444;"></span>$300 reward price</span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const N = 40;
const labels = [];
const startDate = new Date(2025, 9, 30);
for (let i = 0; i < N; i++) {
  const d = new Date(startDate);
  d.setMonth(d.getMonth() + Math.floor(i * 36 / N));
  labels.push(d.toLocaleDateString('en-US', { month: 'short', year: "'yy" }));
}

function gbmPath(S0, mu, sigma, T, steps) {
  const dt = T / steps;
  let S = S0;
  const path = [S];
  for (let i = 1; i <= steps; i++) {
    const z = (Math.random() + Math.random() + Math.random() + Math.random() - 2) * Math.SQRT2;
    S = S * Math.exp((mu - 0.5 * sigma * sigma) * dt + sigma * Math.sqrt(dt) * z);
    path.push(S);
  }
  return path;
}

const S0 = 172.13, mu = 0.03577, sigma = 0.2356, T = 3;
const paths = [];
for (let i = 0; i < 2000; i++) paths.push(gbmPath(S0, mu, sigma, T, N - 1));

function percentile(arr, p) {
  const sorted = [...arr].sort((a, b) => a - b);
  const idx = (p / 100) * (sorted.length - 1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
}

const p10 = [], p25 = [], p50 = [], p75 = [], p90 = [];
for (let t = 0; t < N; t++) {
  const slice = paths.map(p => p[t]);
  p10.push(percentile(slice, 10));
  p25.push(percentile(slice, 25));
  p50.push(percentile(slice, 50));
  p75.push(percentile(slice, 75));
  p90.push(percentile(slice, 90));
}

const blue = '#388bfd';
new Chart(document.getElementById('ciChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'P90',
        data: p90,
        borderColor: 'transparent',
        backgroundColor: 'rgba(56,139,253,0.12)',
        fill: '+4',
        pointRadius: 0,
        tension: 0.4,
      },
      {
        label: 'P75',
        data: p75,
        borderColor: 'transparent',
        backgroundColor: 'rgba(56,139,253,0.18)',
        fill: '+2',
        pointRadius: 0,
        tension: 0.4,
      },
      {
        label: 'P50',
        data: p50,
        borderColor: blue,
        borderWidth: 2,
        backgroundColor: 'transparent',
        fill: false,
        pointRadius: 0,
        tension: 0.4,
      },
      {
        label: 'P25',
        data: p25,
        borderColor: 'transparent',
        backgroundColor: 'rgba(56,139,253,0.18)',
        fill: false,
        pointRadius: 0,
        tension: 0.4,
      },
      {
        label: 'P10',
        data: p10,
        borderColor: 'transparent',
        backgroundColor: 'rgba(56,139,253,0.12)',
        fill: false,
        pointRadius: 0,
        tension: 0.4,
      },
      {
        label: 'Reward price',
        data: Array(N).fill(300),
        borderColor: '#ef4444',
        borderWidth: 1.5,
        borderDash: [6, 4],
        backgroundColor: 'transparent',
        fill: false,
        pointRadius: 0,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1a1a',
        borderColor: '#333',
        borderWidth: 1,
        titleColor: '#aaa',
        bodyColor: '#fff',
        callbacks: {
          label: ctx => {
            if (ctx.dataset.label === 'Reward price') return null;
            return ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`;
          }
        }
      }
    },
    scales: {
      x: {
        grid: { color: '#2a2a2a' },
        ticks: { color: '#666', maxTicksLimit: 8, font: { size: 11 } }
      },
      y: {
        grid: { color: '#2a2a2a' },
        ticks: {
          color: '#666',
          font: { size: 11 },
          callback: v => '$' + Math.round(v)
        }
      }
    }
  }
});
</script>
