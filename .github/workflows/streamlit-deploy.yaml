name: Huggin Face Sync
on:
  push:
    branches: [main]
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Remove the existing .git folder so we have a fresh start
          rm -rf .git

          # 2. Re-initialize 
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 3. Setup LFS before adding files
          git lfs install
          git lfs track "*.parquet"
          git lfs track "*.png"

          # 4. Add everything and commit
          git add .
          git commit -m "Fresh deploy with LFS"

          # 5. Force push to overwrite the broken history on HF
          git remote add space https://b-rown3121:$HF_TOKEN@huggingface.co/spaces/b-rown3121/hersey-stock-pricing
          git push --force space main
